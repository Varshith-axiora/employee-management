replicaCount: 2

image:
  repository: varshithkumar8/employee-management
  tag: v10
  pullPolicy: Always

service:
  type: LoadBalancer
  port: 80
  targetPort: 5000

configMap:
  name: employee-config

secret:
  name: postgres-secret

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

livenessProbe:
  path: /
  port: 5000
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  path: /
  port: 5000
  initialDelaySeconds: 5
  periodSeconds: 5