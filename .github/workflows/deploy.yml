name: Deploy to GKE

on:
  workflow_run:
    workflows: ["Employee Management CI/CD"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ secrets.GKE_ZONE }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy using Helm
        run: |
          helm upgrade --install employee ./employee-chart \
            --set image.repository=${{ secrets.DOCKER_USERNAME }}/employee-management \
            --set image.tag=${{ github.event.workflow_run.head_sha }}

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/employee-management