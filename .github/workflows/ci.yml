name: Employee Management CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/employee-management:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/employee-management:latest \
            .
          

      - name: Push Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/employee-management:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/employee-management:latest