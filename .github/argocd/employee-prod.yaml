apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: employee-prod
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Varshith-axiora/employee-management.git
    targetRevision: HEAD
    path: employee-chart

    helm:
      valueFiles:
        - values-prod.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true